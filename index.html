<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI GlobalChat</title>
    <link rel="stylesheet" href="public/style.css">
</head>
<body>
    <div id="chat-container">
        <h2>GlobalChat AI</h2>
        <div id="messages">
            <div id="typing-indicator">GlobalChat  is translating...</div>
        </div>
        
        <div id="language-selector-container">
            <label for="target-lang">Translate my messages to: </label>
            <select id="target-lang">
                <option value="English" selected>English 🇬🇧</option>
                <option value="Sinhala">Sinhala (සිංහල) 🇱🇰</option>
                <option value="Japanese">Japanese (日本語) 🇯🇵</option>
                <option value="French">French (Français) 🇫🇷</option>
                <option value="Spanish">Spanish (Español) 🇪🇸</option>
            </select>
        </div>

        <form id="chat-form">
            <input type="text" id="msg-input" placeholder="Type anything here..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>

   <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <script src="public/main.js"></script>
</body>
</html>
